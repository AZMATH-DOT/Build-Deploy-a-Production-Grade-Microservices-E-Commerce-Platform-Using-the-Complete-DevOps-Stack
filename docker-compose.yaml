services:
  frontend:
    build: ./services/frontend
    ports:
      - "8080:8080"
    environment:
      - PRODUCT_CATALOG_ADDR=product-catalog:50051
      - CART_ADDR=cart:50051
      - CURRENCY_ADDR=currency:50051
      - SHIPPING_ADDR=shipping:50051
      - CHECKOUT_ADDR=checkout:50051
      - AD_ADDR=ads:50051
      - RECOMMENDATION_ADDR=recommendation:50051

  product-catalog:
    build: ./services/product-catalog
    ports:
      - "50051"

  cart:
    build: ./services/cart
    environment:
      - REDIS_ADDR=redis:6379

  redis:
    image: redis:alpine

  # ... other services ...
